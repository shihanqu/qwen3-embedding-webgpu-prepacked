<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Exact 100-token embedding throughput</title>
  <desc id="desc">Two bar charts compare LM Studio, the existing WebGPU GGUF path, and the prepacked WebGPU path for single-stream and 16-request aggregate throughput.</desc>
  <rect width="1120" height="560" rx="18" fill="#0b1020"/>
  <text x="560" y="48" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="27" font-weight="700">Exact 100-token embedding throughput</text>
  <text x="560" y="76" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Apple M3 Max · Chromium WebGPU · warmed requests · higher is better</text>

  <g font-family="system-ui,sans-serif">
    <rect x="45" y="105" width="500" height="395" rx="14" fill="#121a2e" stroke="#27324a"/>
    <text x="295" y="140" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="650">Single stream</text>
    <line x1="110" y1="440" x2="510" y2="440" stroke="#475569"/>
    <g fill="#64748b" font-size="12" text-anchor="end">
      <text x="100" y="444">0</text><text x="100" y="364">10</text><text x="100" y="284">20</text><text x="100" y="204">30</text><text x="100" y="124">40 req/s</text>
    </g>
    <g stroke="#263247"><line x1="110" y1="360" x2="510" y2="360"/><line x1="110" y1="280" x2="510" y2="280"/><line x1="110" y1="200" x2="510" y2="200"/><line x1="110" y1="120" x2="510" y2="120"/></g>
    <rect x="145" y="275.6" width="80" height="164.4" rx="5" fill="#64748b"/><rect x="270" y="219.8" width="80" height="220.2" rx="5" fill="#38bdf8"/><rect x="395" y="173.0" width="80" height="267.0" rx="5" fill="#34d399"/>
    <g fill="#f8fafc" text-anchor="middle" font-size="15" font-weight="700"><text x="185" y="265">20.55</text><text x="310" y="209">27.53</text><text x="435" y="162">33.37</text></g>
    <g fill="#cbd5e1" text-anchor="middle" font-size="12"><text x="185" y="466">LM Studio</text><text x="310" y="466">GGUF WebGPU</text><text x="435" y="466">Prepacked</text></g>

    <rect x="575" y="105" width="500" height="395" rx="14" fill="#121a2e" stroke="#27324a"/>
    <text x="825" y="140" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="650">16 concurrent · aggregate</text>
    <line x1="640" y1="440" x2="1040" y2="440" stroke="#475569"/>
    <g fill="#64748b" font-size="12" text-anchor="end">
      <text x="630" y="444">0</text><text x="630" y="364">15</text><text x="630" y="284">30</text><text x="630" y="204">45</text><text x="630" y="124">60 req/s</text>
    </g>
    <g stroke="#263247"><line x1="640" y1="360" x2="1040" y2="360"/><line x1="640" y1="280" x2="1040" y2="280"/><line x1="640" y1="200" x2="1040" y2="200"/><line x1="640" y1="120" x2="1040" y2="120"/></g>
    <rect x="675" y="325.9" width="80" height="114.1" rx="5" fill="#64748b"/><rect x="800" y="213.1" width="80" height="226.9" rx="5" fill="#38bdf8"/><rect x="925" y="140.7" width="80" height="299.3" rx="5" fill="#34d399"/>
    <g fill="#f8fafc" text-anchor="middle" font-size="15" font-weight="700"><text x="715" y="315">21.40</text><text x="840" y="202">42.55</text><text x="965" y="130">56.12</text></g>
    <g fill="#cbd5e1" text-anchor="middle" font-size="12"><text x="715" y="466">LM Studio</text><text x="840" y="466">GGUF WebGPU</text><text x="965" y="466">Prepacked</text></g>
  </g>
  <g font-family="system-ui,sans-serif" font-size="13"><circle cx="365" cy="530" r="6" fill="#64748b"/><text x="378" y="534" fill="#94a3b8">LM Studio HTTP</text><circle cx="515" cy="530" r="6" fill="#38bdf8"/><text x="528" y="534" fill="#94a3b8">existing GGUF</text><circle cx="665" cy="530" r="6" fill="#34d399"/><text x="678" y="534" fill="#94a3b8">tile32 prepacked</text></g>
</svg>
