  <line x1="650" y1="120" x2="650" y2="460" class="grid"/><text x="650" y="488" class="tick" text-anchor="middle">0</text><line x1="747.5" y1="120" x2="747.5" y2="460" class="grid"/><text x="747.5" y="488" class="tick" text-anchor="middle">70</text><line x1="845" y1="120" x2="845" y2="460" class="grid"/><text x="845" y="488" class="tick" text-anchor="middle">140</text><line x1="942.5" y1="120" x2="942.5" y2="460" class="grid"/><text x="942.5" y="488" class="tick" text-anchor="middle">210</text><line x1="1040" y1="120" x2="1040" y2="460" class="grid"/><text x="1040" y="488" class="tick" text-anchor="middle">280</text>
  
    <text x="64" y="168" class="row-label" text-anchor="end">15 tok</text>
